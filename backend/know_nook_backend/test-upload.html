<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Test - Study Hub</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>📤 Material Upload Test</h1>
    <p>Test the backend upload API</p>

    <form id="uploadForm">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="title" required placeholder="Enter material title">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="description" rows="3" placeholder="Brief description"></textarea>
        </div>

        <div class="form-group">
            <label>Upload Mode</label>
            <select id="mode" onchange="toggleMode()">
                <option value="file">File Upload</option>
                <option value="link">External Link</option>
            </select>
        </div>

        <div class="form-group" id="fileSection">
            <label>Select File *</label>
            <input type="file" id="file" accept=".pdf,.mp4,.mp3,.avi,.mov,.wav,.m4a">
        </div>

        <div class="form-group" id="linkSection" style="display: none;">
            <label>External Link *</label>
            <input type="url" id="link" placeholder="https://youtube.com/watch?v=...">
        </div>

        <button type="submit">Upload Material</button>
    </form>

    <div id="result"></div>

    <hr style="margin: 30px 0;">

    <h2>📋 Fetch Materials</h2>
    <div class="form-group">
        <label>Material Type</label>
        <select id="fetchType">
            <option value="">All Types</option>
            <option value="textbook">Textbook</option>
            <option value="video">Video</option>
            <option value="audio">Audio</option>
            <option value="notes">Notes</option>
        </select>
    </div>
    <button onclick="fetchMaterials()">Fetch Materials</button>

    <div id="fetchResult"></div>

    <script>
        const API_BASE = 'http://localhost:5500/api/materials';

        function toggleMode() {
            const mode = document.getElementById('mode').value;
            document.getElementById('fileSection').style.display = mode === 'file' ? 'block' : 'none';
            document.getElementById('linkSection').style.display = mode === 'link' ? 'block' : 'none';
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const mode = document.getElementById('mode').value;
            const resultDiv = document.getElementById('result');

            try {
                const formData = new FormData();
                formData.append('title', title);
                formData.append('description', description);

                if (mode === 'file') {
                    const file = document.getElementById('file').files[0];
                    if (!file) {
                        throw new Error('Please select a file');
                    }
                    formData.append('file', file);
                } else {
                    const link = document.getElementById('link').value;
                    if (!link) {
                        throw new Error('Please enter a link');
                    }
                    formData.append('link', link);
                }

                resultDiv.innerHTML = '<p>Uploading...</p>';

                const response = await fetch(API_BASE, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Upload failed');
                }

                const result = await response.json();
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h3>✅ Upload Successful!</h3>
                    <p><strong>ID:</strong> ${result.id}</p>
                    <p><strong>Title:</strong> ${result.title}</p>
                    <p><strong>Type:</strong> ${result.type}</p>
                    <p><strong>Format:</strong> ${result.format}</p>
                    <p><strong>Created:</strong> ${new Date(result.createdAt).toLocaleString()}</p>
                `;

                document.getElementById('uploadForm').reset();
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h3>❌ Upload Failed</h3><p>${error.message}</p>`;
            }
        });

        async function fetchMaterials() {
            const type = document.getElementById('fetchType').value;
            const resultDiv = document.getElementById('fetchResult');

            try {
                resultDiv.innerHTML = '<p>Loading...</p>';

                const url = type ? `${API_BASE}?type=${type}&page=1&limit=10` : `${API_BASE}?page=1&limit=10`;
                const response = await fetch(url);
                const data = await response.json();

                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h3>📦 Materials Found: ${data.totalItems}</h3>
                    <p><strong>Page:</strong> ${data.page} / ${data.totalPages}</p>
                    <ul>
                        ${data.materials.map(m => `
                            <li>
                                <strong>${m.title}</strong> 
                                (${m.type} - ${m.format})
                                <br><small>${m.description || 'No description'}</small>
                            </li>
                        `).join('')}
                    </ul>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h3>❌ Fetch Failed</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
