<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/syllabus-scheduler.css">
    <title>Syllabus Scheduler - StudyClub</title>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="sidebar-logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>StudyClub</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="../../index.html" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                    <a href="../index-dashboard.html" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="../get-started.html" class="nav-item active">
                        <i class="fas fa-rocket"></i>
                        <span>Get Started</span>
                    </a>
                    <a href="../materials.html" class="nav-item">
                        <i class="fas fa-book"></i>
                        <span>Materials</span>
                    </a>
                    <a href="../resources.html" class="nav-item">
                        <i class="fas fa-folder-open"></i>
                        <span>Resources</span>
                    </a>
                    <a href="../community.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Community</span>
                    </a>
                    <a href="../about.html" class="nav-item">
                        <i class="fas fa-info-circle"></i>
                        <span>About</span>
                    </a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Tools</div>
                    <a href="study-bite.html" class="nav-item">
                        <i class="fas fa-fire"></i>
                        <span>StudyBite</span>
                    </a>
                    <a href="cheat-note-creation.html" class="nav-item">
                        <i class="fas fa-sticky-note"></i>
                        <span>Cheat Notes</span>
                    </a>
                    <a href="../KnowNook.html" class="nav-item">
                        <i class="fas fa-robot"></i>
                        <span>KnowNook AI</span>
                    </a>
                    <a href="syllabus-scheduler.html" class="nav-item active">
                        <i class="fas fa-tasks"></i>
                        <span>Syllabus Scheduler</span>
                    </a>
                </div>
            </nav>
        </aside>
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search materials, notes, or ask AI...">
                </div>
            </div>
            <div class="topbar-right">
                <button class="topbar-icon-btn">
                    <i class="fas fa-cog"></i>
                </button>
                <div class="topbar-user" onclick="ModalManager.open('userModal')">
                    <div class="topbar-user-avatar">SS</div>
                    <div class="topbar-user-info">
                        <div class="topbar-user-name">Srujan Sattwik</div>
                        <div class="topbar-user-role">Student</div>
                    </div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="scheduler-container">
                <!-- Wizard View -->
                <div id="wizard-view" style="display: none;">
                    <div class="wizard-progress">
                        <div class="wizard-step active">
                            <div class="wizard-step-circle">1</div>
                            <span class="wizard-step-label">Subjects</span>
                        </div>
                        <div class="wizard-step">
                            <div class="wizard-step-circle">2</div>
                            <span class="wizard-step-label">Chapters</span>
                        </div>
                        <div class="wizard-step">
                            <div class="wizard-step-circle">3</div>
                            <span class="wizard-step-label">Exam Date</span>
                        </div>
                        <div class="wizard-step">
                            <div class="wizard-step-circle">4</div>
                            <span class="wizard-step-label">Availability</span>
                        </div>
                        <div class="wizard-step">
                            <div class="wizard-step-circle">5</div>
                            <span class="wizard-step-label">Confirm</span>
                        </div>
                    </div>
                    <div id="wizard-content"></div>
                </div>

                <!-- Scheduler View -->
                <div id="scheduler-view" style="display: none;">
                    <div class="scheduler-header">
                        <div>
                            <h1>Your Study Plan</h1>
                            <p>Track your progress and manage your tasks</p>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <div class="view-switcher">
                                <button class="view-btn active" onclick="SyllabusScheduler.switchView('calendar')">
                                    <i class="fas fa-calendar"></i> Calendar
                                </button>
                                <button class="view-btn" onclick="SyllabusScheduler.switchView('list')">
                                    <i class="fas fa-list"></i> List
                                </button>
                            </div>
                            <button class="btn btn-secondary" onclick="SyllabusScheduler.resetScheduler()">
                                <i class="fas fa-redo"></i> Reset Plan
                            </button>
                        </div>
                    </div>

                    <!-- Progress Section -->
                    <div id="progress-section"></div>

                    <!-- Syllabus Overview -->
                    <div id="syllabus-overview"></div>

                    <!-- Calendar View -->
                    <div id="calendar-view"></div>

                    <!-- List View -->
                    <div id="list-view" style="display: none;"></div>
                </div>
            </div>
        </main>
    </div>
    <div class="sidebar-overlay"></div>
    <script src="../../assets/js/user-manager.js"></script>
    <script src="../../assets/js/syllabus-scheduler.js"></script>
    <script src="../src/js/layout.js"></script>
</body>
</html>
