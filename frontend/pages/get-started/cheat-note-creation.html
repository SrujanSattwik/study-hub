<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/dashboard.css">
    <title>Cheat Note Creation - StudyClub</title>
    <style>
        .cheat-note-section {
            background: white;
            padding: 80px 0;
        }
        .note-creation-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(102, 126, 234, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        .note-creation-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #333;
        }
        .note-creation-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .note-creation-card textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 1rem;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            resize: vertical;
        }
        .note-creation-card textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .page-header {
            padding: 40px 0;
            text-align: center;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar"></aside>

        <header class="topbar"></header>

        <main class="main-content">
            <div class="content-container">
                <section class="page-header">
                    <div class="container">
                        <div class="header-content">
                            <h1 class="page-title">Cheat Note Creation</h1>
                            <p class="page-subtitle">Simple note-taking tool for quick, shareable study notes.</p>
                        </div>
                    </div>
                </section>

                <section class="cheat-note-section">
                    <div class="container">
                        <h2 class="section-title">Create Your Cheat Note</h2>
                        <div class="note-creation-card">
                            <h3>Note Title</h3>
                            <input type="text" placeholder="Enter note title" />
                            <textarea placeholder="Start typing your notes here..."></textarea>
                            <button class="btn btn-primary">Save Note</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div class="sidebar-overlay"></div>

    <script src="../../assets/js/auth-session.js"></script>
</body>
</html>
