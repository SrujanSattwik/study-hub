<!DOCTYPE html>
<html>
<head>
    <title>Materials API Test</title>
</head>
<body>
    <h1>Materials API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('http://localhost:3001/api/materials');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h2>Success!</h2>
                    <p>Total Materials: ${data.totalItems}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>Error!</h2>
                    <p>${error.message}</p>
                    <p>Make sure backend server is running on port 3001</p>
                `;
            }
        }
        
        // Auto-test on load
        window.onload = testAPI;
    </script>
</body>
</html>
