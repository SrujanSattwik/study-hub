server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing ──────────────────────────────────────────────
    # All unmatched paths fall back to index.html so React Router
    # can handle client-side navigation (prevents 404 on refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ─────────────────────────────────────
    # JS/CSS/images get long-lived cache headers since Vite
    # content-hashes the filenames on every build.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide Nginx version
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
